<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Modern Wallet Body with Gradient and Glass Effect -->
  <defs>
    <linearGradient id="walletGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>

  <!-- Shadow for Depth -->
  <rect x="110" y="150" width="292" height="232" rx="30" fill="black" fill-opacity="0.1" transform="translate(5, 10)" />

  <!-- Main Wallet Shape -->
  <rect x="110" y="150" width="292" height="232" rx="30" fill="url(#walletGradient)" />
  <rect x="110" y="150" width="292" height="232" rx="30" stroke="white" stroke-width="2" stroke-opacity="0.3" fill="none" />

  <!-- Accent Line (Top Fold) -->
  <path d="M110 200 L402 200" stroke="white" stroke-width="1" stroke-opacity="0.2" />

  <!-- Professional Pocket/Flap -->
  <rect x="280" y="210" width="140" height="110" rx="15" fill="white" fill-opacity="0.9" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))" />
  
  <!-- Money Symbol (Minimalist Icon inside Pocket) -->
  <circle cx="350" cy="265" r="22" fill="#3b82f6" />
  <path d="M344 255 L356 255 M350 249 L350 281 M344 275 L356 275" stroke="white" stroke-width="4" stroke-linecap="round" />
  
  <!-- Subtle Glow -->
  <circle cx="150" cy="150" r="80" fill="white" fill-opacity="0.1" filter="url(#blur)" />
</svg>
